apiVersion: kubedb.com/v1alpha2
kind: Singlestore
metadata:
  name: sdb-dedicated
  namespace: demo
spec:
  version: "8.1.32"
  topology:
    aggregator:
      replicas: 3
      podTemplate:
        spec:
          containers:
            - name: singlestore
              resources:
                requests:
                  cpu: "1000m"
                  memory: 1000Mi
                limits:
                  cpu: "2000m"
                  memory: 2000Mi
      storage:
        storageClassName: "standard"
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1000Mi
    leaf:
      replicas: 2
      podTemplate:
        spec:
          containers:
            - name: singlestore
              resources:
                requests:
                  cpu: "1000m"
                  memory: 1000Mi
                limits:
                  cpu: "2000m"
                  memory: 2000Mi
      storage:
        storageClassName: "standard"
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10000Mi
  licenseSecret:
    name: license-secret
  storageType: Durable
  monitor:
    agent: prometheus.io/operator
    prometheus:
      serviceMonitor:
        labels:
          release: prometheus
        interval: 10s
  terminationPolicy: Halt
