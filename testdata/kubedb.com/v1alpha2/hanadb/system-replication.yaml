apiVersion: kubedb.com/v1alpha2
kind: HanaDB
metadata:
  name: hana-cluster
  namespace: demo
spec:
  version: "2.0.82"
  replicas: 2
  storageType: Durable
  topology:
    mode: SystemReplication
  storage:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 100Gi
  arbiter:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
        storage: 2Gi
      limits:
        memory: 256Mi
  monitor:
    agent: prometheus.io/operator
    prometheus:
      exporter:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 128Mi
  podTemplate:
    spec:
      containers:
      - name: hanadb
        resources:
          requests:
            cpu: "4"
            memory: 12Gi
          limits:
            cpu: "8"
            memory: 16Gi
      - name: hanadb-coordinator
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            memory: 256Mi
