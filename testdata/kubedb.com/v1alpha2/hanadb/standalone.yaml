apiVersion: kubedb.com/v1alpha2
kind: HanaDB
metadata:
  name: hana-standalone
  namespace: demo
spec:
  version: "2.0.82"
  replicas: 1
  storageType: Durable
  storage:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 64Gi
  podTemplate:
    spec:
      containers:
      - name: hanadb
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 10Gi
