apiVersion: kubedb.com/v1alplha2
kind: Qdrant
metadata:
  name: qdrant
  namespace: demo
spec:
  version: 1.16.2
  mode: distributed
  replicas: 3
  podTemplate:
    spec:
      containers:
        - name: qdrant
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 500Mi
  monitor:
    agent: prometheus.io
    prometheus:
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi