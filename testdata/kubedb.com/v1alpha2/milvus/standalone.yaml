apiVersion: kubedb.com/v1alpha2
kind: Milvus
metadata:
  name: milvus-standalone
  namespace: kubedb
spec:
  version: "2.6.11"
  topology:
    mode: Standalone
  objectStorage:
    configSecret:
      name: "my-release-minio"
  metaStorage:
    externallyManaged: true
    endpoints:
      - http://etcdcluster-sample-0.etcdcluster-sample.default.svc.cluster.local:2379
      - http://etcdcluster-sample-1.etcdcluster-sample.default.svc.cluster.local:2379
      - http://etcdcluster-sample-2.etcdcluster-sample.default.svc.cluster.local:2379
  podTemplate:
    spec:
      containers:
        - name: milvus
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
              storage: "1Gi"
  storageType: Durable
  storage:
    accessModes:
      - ReadWriteOnce
    storageClassName: local-path
    resources:
      requests:
        storage: 1Gi
  monitor:
    agent: prometheus.io/operator
    prometheus:
      exporter:
        port: 9091
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add: [ "SYS_RESOURCE" ]
            drop:
              - ALL
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
      serviceMonitor:
        interval: 10s
        labels:
          release: prometheus